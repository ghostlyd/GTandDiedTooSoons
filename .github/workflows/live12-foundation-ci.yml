name: Live 12 Foundation CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  repository-contract:
    name: Repository contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate manifests, provenance policy, and binary hygiene
        run: python3 scripts/validate_repo.py

      - name: Verify generated OpenAI worker briefs are in sync
        run: |
          python3 scripts/render_openai_worker_briefs.py --stable --output /tmp/openai-worker-briefs.json
          diff -u automation/generated/openai-worker-briefs.json /tmp/openai-worker-briefs.json

      - name: Verify generated composition sketches are in sync
        run: |
          rm -rf /tmp/composition-sketches
          python3 scripts/render_composition_sketches.py --stable --output-dir /tmp/composition-sketches
          diff -ru compositions/generated /tmp/composition-sketches

      - name: Exercise inventory script in dry-run mode
        run: python3 scripts/inventory_live_suite.py --dry-run --output inventory/live12-local-inventory.json

  macos-ableton-contract:
    name: macOS Ableton path contract
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository on macOS
        run: python3 scripts/validate_repo.py

      - name: Verify generated OpenAI worker briefs are in sync
        run: |
          python3 scripts/render_openai_worker_briefs.py --stable --output /tmp/openai-worker-briefs.json
          diff -u automation/generated/openai-worker-briefs.json /tmp/openai-worker-briefs.json

      - name: Verify generated composition sketches are in sync
        run: |
          rm -rf /tmp/composition-sketches
          python3 scripts/render_composition_sketches.py --stable --output-dir /tmp/composition-sketches
          diff -ru compositions/generated /tmp/composition-sketches

      - name: Generate non-sensitive host inventory snapshot
        run: python3 scripts/inventory_live_suite.py --dry-run
