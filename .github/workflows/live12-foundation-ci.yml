name: Live 12 Foundation CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  repository-contract:
    name: Repository contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify generated OpenAI worker briefs are in sync
        run: |
          python3 scripts/render_openai_worker_briefs.py --stable --output /tmp/openai-worker-briefs.json
          diff -u automation/generated/openai-worker-briefs.json /tmp/openai-worker-briefs.json

      - name: Verify generated OpenAI production swarm queue is in sync
        run: |
          python3 scripts/render_openai_production_swarm_queue.py --stable --output /tmp/openai-production-swarm-queue.json --markdown-output /tmp/openai-production-swarm-queue.md
          diff -u automation/generated/openai-production-swarm-queue.json /tmp/openai-production-swarm-queue.json
          diff -u docs/openai-production-swarm-queue.md /tmp/openai-production-swarm-queue.md

      - name: Verify generated composition sketches are in sync
        run: |
          rm -rf /tmp/composition-sketches
          python3 scripts/render_composition_sketches.py --stable --output-dir /tmp/composition-sketches
          diff -ru compositions/generated /tmp/composition-sketches

      - name: Verify generated production appeal scorecards are in sync
        run: |
          python3 scripts/render_production_appeal_scorecards.py --stable --output /tmp/production-appeal-scorecards.json --markdown-output /tmp/production-appeal-scorecards.md
          diff -u automation/generated/production-appeal-scorecards.json /tmp/production-appeal-scorecards.json
          diff -u docs/production-appeal-scorecards.md /tmp/production-appeal-scorecards.md

      - name: Verify generated library installation queue is in sync
        run: |
          python3 scripts/render_library_installation_queue.py --stable --output /tmp/library-installation-queue.json --markdown-output /tmp/library-installation-queue.md
          diff -u automation/generated/library-installation-queue.json /tmp/library-installation-queue.json
          diff -u docs/library-installation-queue.md /tmp/library-installation-queue.md

      - name: Verify generated Live 12 DAW action plan is in sync
        run: |
          python3 scripts/render_live12_daw_action_plan.py --stable --output /tmp/live12-daw-action-plan.json
          diff -u automation/generated/live12-daw-action-plan.json /tmp/live12-daw-action-plan.json

      - name: Verify generated public-domain source deck is in sync
        run: |
          python3 scripts/render_public_domain_source_deck.py --stable --output /tmp/public-domain-source-deck.json --markdown-output /tmp/public-domain-source-deck.md
          diff -u automation/generated/public-domain-source-deck.json /tmp/public-domain-source-deck.json
          diff -u docs/public-domain-source-deck.md /tmp/public-domain-source-deck.md

      - name: Verify generated Live 12 DAW mutation package is in sync
        run: |
          python3 scripts/render_live12_daw_mutation_package.py --stable --output /tmp/live12-daw-mutation-package.json
          diff -u automation/generated/live12-daw-mutation-package.json /tmp/live12-daw-mutation-package.json

      - name: Verify generated Max for Live device contracts are in sync
        run: |
          rm -rf /tmp/max-for-live-patches
          python3 scripts/render_max_for_live_device_contracts.py --stable --output /tmp/max-for-live-device-contracts.json --patch-output-dir /tmp/max-for-live-patches
          diff -u automation/generated/max-for-live-device-contracts.json /tmp/max-for-live-device-contracts.json
          diff -ru max-for-live/patches /tmp/max-for-live-patches

      - name: Verify generated Live 12 DAW mutation runbook is in sync
        run: |
          python3 scripts/render_live12_daw_mutation_runbook.py --stable --output /tmp/live12-daw-mutation-runbook.json --markdown-output /tmp/live12-daw-mutation-runbook.md
          diff -u automation/generated/live12-daw-mutation-runbook.json /tmp/live12-daw-mutation-runbook.json
          diff -u docs/live12-daw-mutation-runbook.md /tmp/live12-daw-mutation-runbook.md

      - name: Verify generated Live 12 DAW mutation queue runbook is in sync
        run: |
          python3 scripts/render_live12_daw_mutation_queue_runbook.py --stable --output /tmp/live12-daw-mutation-queue-runbook.json --markdown-output /tmp/live12-daw-mutation-queue-runbook.md
          diff -u automation/generated/live12-daw-mutation-queue-runbook.json /tmp/live12-daw-mutation-queue-runbook.json
          diff -u docs/live12-daw-mutation-queue-runbook.md /tmp/live12-daw-mutation-queue-runbook.md

      - name: Validate manifests, provenance policy, and binary hygiene
        run: python3 scripts/validate_repo.py

      - name: Run Max for Live device contract probes
        run: python3 scripts/test_max_for_live_device_contracts.py

      - name: Run OpenAI production swarm queue probes
        run: python3 scripts/test_openai_production_swarm_queue.py

      - name: Run production appeal scorecard probes
        run: python3 scripts/test_production_appeal_scorecards.py

      - name: Run library installation queue probes
        run: python3 scripts/test_library_installation_queue.py

      - name: Run library installation preflight probes
        run: python3 scripts/test_library_installation_preflight.py

      - name: Run Live 12 DAW mutation preflight probes
        run: python3 scripts/test_live12_daw_mutation_preflight.py

      - name: Run Live 12 DAW mutation runbook probes
        run: python3 scripts/test_live12_daw_mutation_runbook.py

      - name: Run Live 12 DAW mutation queue runbook probes
        run: python3 scripts/test_live12_daw_mutation_queue_runbook.py

      - name: Run public-domain source deck probes
        run: python3 scripts/test_public_domain_source_deck.py

      - name: Exercise inventory script in dry-run mode
        run: python3 scripts/inventory_live_suite.py --dry-run --output inventory/live12-local-inventory.json

  macos-ableton-contract:
    name: macOS Ableton path contract
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify generated OpenAI worker briefs are in sync
        run: |
          python3 scripts/render_openai_worker_briefs.py --stable --output /tmp/openai-worker-briefs.json
          diff -u automation/generated/openai-worker-briefs.json /tmp/openai-worker-briefs.json

      - name: Verify generated OpenAI production swarm queue is in sync
        run: |
          python3 scripts/render_openai_production_swarm_queue.py --stable --output /tmp/openai-production-swarm-queue.json --markdown-output /tmp/openai-production-swarm-queue.md
          diff -u automation/generated/openai-production-swarm-queue.json /tmp/openai-production-swarm-queue.json
          diff -u docs/openai-production-swarm-queue.md /tmp/openai-production-swarm-queue.md

      - name: Verify generated composition sketches are in sync
        run: |
          rm -rf /tmp/composition-sketches
          python3 scripts/render_composition_sketches.py --stable --output-dir /tmp/composition-sketches
          diff -ru compositions/generated /tmp/composition-sketches

      - name: Verify generated production appeal scorecards are in sync
        run: |
          python3 scripts/render_production_appeal_scorecards.py --stable --output /tmp/production-appeal-scorecards.json --markdown-output /tmp/production-appeal-scorecards.md
          diff -u automation/generated/production-appeal-scorecards.json /tmp/production-appeal-scorecards.json
          diff -u docs/production-appeal-scorecards.md /tmp/production-appeal-scorecards.md

      - name: Verify generated library installation queue is in sync
        run: |
          python3 scripts/render_library_installation_queue.py --stable --output /tmp/library-installation-queue.json --markdown-output /tmp/library-installation-queue.md
          diff -u automation/generated/library-installation-queue.json /tmp/library-installation-queue.json
          diff -u docs/library-installation-queue.md /tmp/library-installation-queue.md

      - name: Verify generated Live 12 DAW action plan is in sync
        run: |
          python3 scripts/render_live12_daw_action_plan.py --stable --output /tmp/live12-daw-action-plan.json
          diff -u automation/generated/live12-daw-action-plan.json /tmp/live12-daw-action-plan.json

      - name: Verify generated public-domain source deck is in sync
        run: |
          python3 scripts/render_public_domain_source_deck.py --stable --output /tmp/public-domain-source-deck.json --markdown-output /tmp/public-domain-source-deck.md
          diff -u automation/generated/public-domain-source-deck.json /tmp/public-domain-source-deck.json
          diff -u docs/public-domain-source-deck.md /tmp/public-domain-source-deck.md

      - name: Verify generated Live 12 DAW mutation package is in sync
        run: |
          python3 scripts/render_live12_daw_mutation_package.py --stable --output /tmp/live12-daw-mutation-package.json
          diff -u automation/generated/live12-daw-mutation-package.json /tmp/live12-daw-mutation-package.json

      - name: Verify generated Max for Live device contracts are in sync
        run: |
          rm -rf /tmp/max-for-live-patches
          python3 scripts/render_max_for_live_device_contracts.py --stable --output /tmp/max-for-live-device-contracts.json --patch-output-dir /tmp/max-for-live-patches
          diff -u automation/generated/max-for-live-device-contracts.json /tmp/max-for-live-device-contracts.json
          diff -ru max-for-live/patches /tmp/max-for-live-patches

      - name: Verify generated Live 12 DAW mutation runbook is in sync
        run: |
          python3 scripts/render_live12_daw_mutation_runbook.py --stable --output /tmp/live12-daw-mutation-runbook.json --markdown-output /tmp/live12-daw-mutation-runbook.md
          diff -u automation/generated/live12-daw-mutation-runbook.json /tmp/live12-daw-mutation-runbook.json
          diff -u docs/live12-daw-mutation-runbook.md /tmp/live12-daw-mutation-runbook.md

      - name: Verify generated Live 12 DAW mutation queue runbook is in sync
        run: |
          python3 scripts/render_live12_daw_mutation_queue_runbook.py --stable --output /tmp/live12-daw-mutation-queue-runbook.json --markdown-output /tmp/live12-daw-mutation-queue-runbook.md
          diff -u automation/generated/live12-daw-mutation-queue-runbook.json /tmp/live12-daw-mutation-queue-runbook.json
          diff -u docs/live12-daw-mutation-queue-runbook.md /tmp/live12-daw-mutation-queue-runbook.md

      - name: Validate repository on macOS
        run: python3 scripts/validate_repo.py

      - name: Run Max for Live device contract probes
        run: python3 scripts/test_max_for_live_device_contracts.py

      - name: Run OpenAI production swarm queue probes
        run: python3 scripts/test_openai_production_swarm_queue.py

      - name: Run production appeal scorecard probes
        run: python3 scripts/test_production_appeal_scorecards.py

      - name: Run library installation queue probes
        run: python3 scripts/test_library_installation_queue.py

      - name: Run library installation preflight probes
        run: python3 scripts/test_library_installation_preflight.py

      - name: Run Live 12 DAW mutation preflight probes
        run: python3 scripts/test_live12_daw_mutation_preflight.py

      - name: Run Live 12 DAW mutation runbook probes
        run: python3 scripts/test_live12_daw_mutation_runbook.py

      - name: Run Live 12 DAW mutation queue runbook probes
        run: python3 scripts/test_live12_daw_mutation_queue_runbook.py

      - name: Run public-domain source deck probes
        run: python3 scripts/test_public_domain_source_deck.py

      - name: Generate non-sensitive host inventory snapshot
        run: python3 scripts/inventory_live_suite.py --dry-run
